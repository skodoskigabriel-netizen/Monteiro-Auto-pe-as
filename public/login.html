<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login Admin</title>

<style>
body {
  background: #0f0f0f;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1c1c1c;
  padding: 30px;
  border-radius: 10px;
  text-align: center;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 200px;
}

button {
  padding: 10px;
  background: #FFD700;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login Admin</h2>

  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
</div>

<script>
async function login() {
  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user: document.getElementById("user").value,
      pass: document.getElementById("pass").value
    })
  });

  const data = await res.json();

  if (data.ok) {
    // 🔥 FIX REAL
    localStorage.setItem("token", "ok");

    alert("Login OK!");
    window.location.href = "admin.html";
  } else {
    alert("Usuário ou senha inválidos");
  }
}
</script>

</body>
</html>
